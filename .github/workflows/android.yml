name: Android CI
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
        working-directory: ./android
    - name: chmod
      run: chmod +x gradle
      working-directory: ./android
    - name: Build with Gradle
      run: ./gradle build
      working-directory: ./android
